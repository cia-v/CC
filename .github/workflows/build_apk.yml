\f0\fs24 \cf0 name: Build Android APK\
\
on:\
  push:\
    branches: [ main ]\
  workflow_dispatch: # \uc0\u20801 \u35768 \u25163 \u21160 \u35302 \u21457 \
\
jobs:\
  build:\
    runs-on: ubuntu-latest\
\
    steps:\
    - name: Checkout code\
      uses: actions/checkout@v3\
\
    - name: Set up Python\
      uses: actions/setup-python@v4\
      with:\
        python-version: '3.10'\
\
    - name: Install dependencies\
      run: |\
        sudo apt-get update\
        sudo apt-get install -y \\\
          build-essential \\\
          git \\\
          zip \\\
          unzip \\\
          openjdk-17-jdk \\\
          autoconf \\\
          automake \\\
          libtool \\\
          pkg-config \\\
          zlib1g-dev \\\
          libncurses5-dev \\\
          libncursesw5-dev \\\
          libtinfo5 \\\
          libffi-dev \\\
          libssl-dev \\\
          wget \\\
          curl \\\
          lzip \\\
          patch\
        pip install --upgrade pip\
        pip install buildozer cython==0.29.36\
\
    - name: Cache Buildozer global directory\
      uses: actions/cache@v3\
      with:\
        path: ~/.buildozer\
        key: $\{\{ runner.os \}\}-buildozer-$\{\{ hashFiles('buildozer.spec') \}\}\
        restore-keys: |\
          $\{\{ runner.os \}\}-buildozer-\
\
    - name: Build APK with Buildozer\
      run: |\
        # \uc0\u30830 \u20445  buildozer.spec \u20013 \u30340  android.accept_sdk_license = True\
        sed -i 's/#android.accept_sdk_license = False/android.accept_sdk_license = True/' buildozer.spec\
        buildozer android debug\
\
    - name: Upload APK artifact\
      uses: actions/upload-artifact@v3\
      with:\
        name: lathe-calculator-apk\
        path: bin/*.apk}